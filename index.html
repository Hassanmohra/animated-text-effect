<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم تعليمية</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تصميم شبكة المربعات */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .grid-item {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
        }

        .grid-item input {
            width: 80%;
            background: #2d2d2d;
            border: 1px solid #555;
            color: #fff;
            text-align: center;
            margin-top: 5px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 30px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        /* شاشة عرض البيانات المتدفقة */
        #logConsole {
            display: none;
            width: 100%;
            max-width: 600px;
            background-color: #000;
            font-family: monospace;
            padding: 15px;
            height: 200px;
            overflow-y: scroll;
            border: 1px solid #00ff00;
            color: #00ff00;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>لوحة البيانات الرقمية (22 عنصر)</h2>
    
    <div class="grid-container" id="grid"></div>

    <button class="btn" onclick="processData()">بدء المعالجة</button>

    <div id="logConsole"></div>

    <script>
        // توليد 22 مربعاً برمجياً عند تحميل الصفحة
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 22; i++) {
            grid.innerHTML += `
                <div class="grid-item">
                    <label>مربع ${i}</label>
                    <input type="text" id="input-${i}" placeholder="0">
                </div>
            `;
        }

        function processData() {
            const consoleBox = document.getElementById('logConsole');
            consoleBox.style.display = 'block';
            consoleBox.innerHTML = ''; // تفريغ الشاشة

            // محاكاة تدفق البيانات بناءً على القيم المدخلة
            let lineCount = 0;
            const interval = setInterval(() => {
                if (lineCount < 50) { // طباعة 50 سطر كمثال
                    consoleBox.innerHTML += `[تحديث] جاري معالجة الحزمة الرقمية السلسلة رقم... ${Math.random().toString(36).substring(7)}<br>`;
                    consoleBox.scrollTop = consoleBox.scrollHeight; // التمرير التلقائي لأسفل
                    lineCount++;
                } else {
                    clearInterval(interval);
                }
            }, 50); // سرعة التدفق (كل 50 ملي ثانية)
        }
    </script>

</body>
</html>
