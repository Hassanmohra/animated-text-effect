<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة تفاعلية - تأثير نصوص متحركة</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* واجهة الزر البسيط */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(15, 15, 15, 0.85);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.1);
            border: 1px solid #1f1f1f;
            transition: opacity 0.5s ease;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            color: #eceff1;
        }
        .btn-start {
            background-color: #00e676;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }
        .btn-start:hover {
            background-color: #00c853;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.5);
        }
        /* لوحة الرسم الخلفية */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* مخفي في البداية */
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- الواجهة البدائية المخصصة للبدء -->
    <div class="container" id="controlPanel">
        <h1>واجهة العرض التوضيحية</h1>
        <button class="btn-start" onclick="startEffect()">بدء الارسال</button>
    </div>

    <!-- لوحة إسقاط النصوص المتحركة -->
    <canvas id="textCanvas"></canvas>

    <script>
        function startEffect() {
            // إخفاء زر البدء
            document.getElementById('controlPanel').style.display = 'none';
            
            // إظهار وتشغيل لوحة الـ Canvas
            const canvas = document.getElementById('textCanvas');
            canvas.style.display = 'block';
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // الحروف العشوائية للتأثير البصري
            const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const rainDrops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00e676'; // لون الخطوط المتحركة
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < rainDrops.length; i++) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                    if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        rainDrops[i] = 0;
                    }
                    rainDrops[i]++;
                }
            }

            // تكرار الرسم بسرعة عالية لإنشاء الحركة
            setInterval(draw, 30);

            // تكييف الحجم عند تغيير أبعاد الشاشة
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }
    </script>
</body>
</html>
